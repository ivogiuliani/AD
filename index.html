<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrea Damiani | Accesso</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --gold: #c9a84c;
      --gold-light: #dfc06e;
      --gold-glow: rgba(201, 168, 76, 0.15);
      --text: #f5f0e8;
      --text-muted: #7a746c;
      --border: rgba(201, 168, 76, 0.2);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* Background effects */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(201, 168, 76, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Login card */
    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 3.5rem 3rem;
      text-align: center;
      border: 1px solid var(--border);
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Logo */
    .login-logo {
      margin-bottom: 0.75rem;
    }
    .login-logo img {
      height: 50px;
      width: auto;
      opacity: 0.9;
    }

    .login-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
    }
    .login-name span { color: var(--gold); }

    .login-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    /* Gold line separator */
    .login-line {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2.5rem;
    }

    /* Input group */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.25rem;
      padding-right: 3rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: all 0.3s;
      -webkit-appearance: none;
    }

    .input-group input::placeholder {
      color: var(--text-muted);
      letter-spacing: 0.1em;
      font-size: 0.8rem;
    }

    .input-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(201, 168, 76, 0.1);
    }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.25rem;
      transition: color 0.3s;
    }
    .toggle-pw:hover { color: var(--gold); }

    /* Submit button */
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: var(--gold);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-btn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* Error message */
    .error-msg {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #e74c3c;
      opacity: 0;
      transform: translateY(-5px);
      transition: all 0.3s;
      height: 0;
    }

    .error-msg.show {
      opacity: 1;
      transform: translateY(0);
      height: auto;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.5s; }

    /* Fade-out transition on success */
    .login-card.success {
      animation: fadeOut 0.6s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.95) translateY(-10px); }
    }

    /* Success checkmark */
    .success-icon {
      display: none;
      margin: 1rem auto 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gold);
      align-items: center;
      justify-content: center;
      color: var(--bg);
      font-size: 1.2rem;
    }
    .success-icon.show {
      display: flex;
      animation: popIn 0.3s;
    }
    @keyframes popIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    /* Footer text */
    .login-footer {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        margin: 1rem;
        padding: 2.5rem 2rem;
      }
      .login-name { font-size: 1.5rem; }
    }

    @media (max-width: 360px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
      .login-name { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="login-card" id="loginCard">
    <div class="login-logo">
      <img src="img/logo.png" alt="Andrea Damiani Coach">
    </div>
    <h1 class="login-name">Andrea <span>Damiani</span></h1>
    <p class="login-subtitle">Life &amp; Business Coach</p>
    <div class="login-line"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="input-group">
        <input type="password" id="pwInput" placeholder="Inserisci la password" autocomplete="off" autofocus>
        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Mostra password">
          &#128065;
        </button>
      </div>
      <button type="submit" class="login-btn">Accedi</button>
    </form>

    <div class="error-msg" id="errorMsg">Password non corretta. Riprova.</div>

    <div class="success-icon" id="successIcon">&#10003;</div>

    <p class="login-footer">&copy; Andrea Damiani &mdash; Area riservata</p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('pwInput').value.trim().toLowerCase();
      const card = document.getElementById('loginCard');
      const errMsg = document.getElementById('errorMsg');
      const successIcon = document.getElementById('successIcon');

      if (pw === 'andrea') {
        // Success
        errMsg.classList.remove('show');
        successIcon.classList.add('show');
        document.querySelector('.login-btn').textContent = 'Benvenuto!';
        document.querySelector('.login-btn').style.pointerEvents = 'none';

        setTimeout(() => {
          card.classList.add('success');
        }, 600);

        setTimeout(() => {
          window.location.href = 'site.html';
        }, 1200);

        return false;
      }

      // Fail
      errMsg.classList.add('show');
      card.classList.add('shake');
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();

      setTimeout(() => {
        card.classList.remove('shake');
      }, 500);

      return false;
    }

    function togglePassword() {
      const input = document.getElementById('pwInput');
      const btn = document.querySelector('.toggle-pw');
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '&#128064;';
      } else {
        input.type = 'password';
        btn.innerHTML = '&#128065;';
      }
    }

    // Enter key
    document.getElementById('pwInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin(e);
    });
  </script>
</body>
</html>
